<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Schoology AI Assistant</title>
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 15px 0;
      color: #333;
    }
    .status {
      padding: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      margin-bottom: 15px;
    }
    .status.connected {
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    .config-section {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      font-size: 14px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      margin-top: 10px;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .warning {
      background: #fff3cd;
      border: 1px solid #ffc107;
      padding: 10px;
      border-radius: 4px;
      margin-top: 15px;
      font-size: 12px;
      color: #856404;
    }
    .stats {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Schoology AI Assistant</h1>

  <div id="status" class="status">
    Checking connection...
  </div>

  <div class="config-section">
    <label for="apiKey">OpenAI API Key:</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    <button id="saveConfig">Save Configuration</button>
  </div>

  <div class="stats">
    <div>Assignments completed: <span id="completedCount">0</span></div>
    <div>Backend status: <span id="backendStatus">Unknown</span></div>
  </div>

  <div class="warning">
    ⚠️ <strong>Academic Integrity Notice:</strong> Use this tool responsibly and in accordance with your institution's policies. This is an educational aid, not a replacement for learning.
  </div>

  <script src="popup.js"></script>
</body>
</html>
